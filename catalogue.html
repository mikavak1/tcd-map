<!DOCTYPE html>
<html lang = "en">
<head>
  <meta charset = "UTF-8">
  <meta name ="viewport" content="width=device-width, initial-scale=1.0">
  <title> A-Z Building Catalogue - Trinity College Dublin </title>
  <meta name ="description" content ="Alphabetical catalogue of all buildings on the Trinity College Dublin campus.">

  <!--Site styles -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/catalogue.css">
  <!--PLACEHOLDER favicon<link rel="icon" href="images/favicon.ico">-->
</head>
<body class="page-catalogue">

  <!--HEADER -->
  <header class="site-header" role="banner">
    <a href="index.html" class="header-brand" aria-label="Trinity College Dublin - Campus Map home">
      <img src="images/TCDLOGO.png" alt="TCD logo" width="55" height="55" class="header-brand-logo">
      <div class="header-brand-text">
      <strong> Trinity College Dublin </strong>
        <span> Coláiste na Tríonóide, Baile Átha Cliath </span>
        <span> The University of Dublin </span>
      </div>
    </a>

    <nav class= "header-nav" aria-label="Site navigation">
      <a href= "index.html" class="header-nav-link" aria-label ="Back to interactive map">
        <span class="nav-arrow" aria-hidden="true">&#9664;</span> Back to MAP
      </a>
    </nav>
  </header>

  <!-- MAIN CONTENT-->
  <main>
    <div class="catalogue-main">
      <!--Sticky search, alphabet controls -->
      <div class="catalogue-controls"  role="search" aria-label="Search and filter buildings">
        <div class="catalogue-search-row" >
          <div class="catalogue-search-wrapper">
            <svg xmlns="http://www.w3.org/2000/svg" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/> <!--magnifying glass-->
            </svg>
            <input type="search" id="catalogue-search" class="catalogue-search-input" placeholder="Search buildings…" autocomplete="off" aria-label="Search campus buildings" aria-controls="building-list">
          </div>
          <div class= "catalogue-toolbar-btns">
            <!--Filter -->
            <button id="btn-filter" class="toolbar-btn" aria-label="Filter by category" aria-controls="filter-panel" aria-expanded="false">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
              </svg> 
            </button>
            <!--  Saved -->
            <button id="btn-saved-toolbar" class="toolbar-btn" aria-label="View saved buildings" aria-controls="saved-panel" aria-pressed="false">
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/> 
              </svg>
            </button>
          </div>
        </div>
        <!--Alphabet navigation -->
        <nav id="alpha-bar" class="alpha-bar" aria-label="Alphabetical navigation"> </nav>

      </div> <!--catalogue-controls -->

      <!-- Building list grouped by letter -->
      <div id="building-list" aria-live="polite" aria-label="Buildings list"> </div>

    </div> <!--catalogue-main -->
  </main>
  
  <!-- PANEL OVERLAY (darkens page when a side panel is open)  -->
  <div id="panel-overlay" class="side-panel-overlay" aria-hidden ="true" role="presentation"> </div>

  <!--FILTER PANEL -->
  <aside id="filter-panel" class="side-panel" role="dialog" aria-label="Filter buildings by category" aria-modal="true" aria-hidden="true">
    <div class="side-panel-top">
      <button id="btn-filter-close" class="side-panel-close" aria-label="Close filter panel">&#10005;</button> <!-- cross -->
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--oxford-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden ="true" style="margin-left:auto;">
        <polygon  points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>
      </svg>
    </div>
   <div  id="filter-panel-body" class="side-panel-body"></div>
  </aside>

  <!--SAVED PANEL-->
  <aside id="saved-panel"  class="side-panel" role="dialog" aria-label="Saved buildings" aria-modal="true" aria-hidden="true">
    <div class="side-panel-top">
      <button id="btn-saved-close" class="side-panel-close" aria-label="Close saved buildings panel">&#10005;</button> <!-- cross -->
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill ="var(--oxford-blue)" stroke="var(--oxford-blue)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="margin-left:auto;">
        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <div id="saved-panel-body" class="side-panel-body"></div>
  </aside>

  <!-- FOOTER -->
  <div class="catalogue-footer">
    <footer class="site-footer" role="contentinfo">

      <address>
        <strong>Trinity College Dublin, The University of Dublin</strong><br>
        College Green, Dublin 2, Ireland<br>
        T: <a href="tel:+35318961000" style="color:rgba(255,255,255,0.75)">+353 1 896 1000</a>
      </address>

      <nav class="footer-links" aria-label="Footer links">
        <a href="#placeholder-feedback">Feedback Form</a>
        <a href="https://www.tcd.ie" target="_blank" rel="noopener">Main TCD page</a>
      </nav>

      <div class="footer-social" aria-label ="Social media links">
        <a href="#placeholder-x" class ="footer-social-link" aria-label="Trinity College Dublin on X (Twitter)" target="_blank" rel="noopener">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d ="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
          </svg>
        </a>

        <a href="#placeholder-instagram"  class="footer-social-link" aria-label="Trinity College Dublin on Instagram" target="_blank" rel="noopener">
          <svg  xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
          </svg>
        </a>

        <a href="#placeholder-facebook" class="footer-social-link" aria-label="Trinity College Dublin on Facebook" target="_blank" rel="noopener">
          <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
          </svg>
        </a>

      </div>
    </footer>
  </div>

  
  <!--js SCRIPTS-->
<script src="data/buildings.js"> </script>
<script src="js/shared.js"> </script>
<script src="js/catalogue.js"> </script>

</body>
</html>
